        externalIdsForCancelAndRedo: false
        fxRates:
        - destination: USD
          rate: 1.18888
          source: EUR
        groupingHint: '~'
        ignorableData: null
        investmentPreference: {}
        isCancelAndRedo: false
        isCancelOnlyForecastTransactions: false
        legalEntityReference: null
        numberOfShares: '~'
        orderReference:
          externalId: E-ID-0001
          type: OrderByExternalId
        overrideFindExistingReceivablesLiabilityTransactionReference: null
        overrideFindExistingTransactionReference: '~'
        payDate: '2022-01-24'
        payments:
        - amount: 122
          currency: EUR
          name: null
        pricePerShare: '~'
        providerId: QPLIX Bank
        ratioShares: '~'
        ratioSubscriptionRights: '~'
        securityReference: null
        sourceFilename: '~'
        subscriptionPrice: '~'
        tags:
        - QPLIX
        - Payments
        - Transaction
        totalValue: '~'
        type: WithdrawalSubscriptionRightsTransaction
        valueDate: '2022-01-26'
      properties:
        bankAccountReference:
          description: |-
            A reference mechanism which identifies a bank account

            See: [Bank Accounts](#tag/BankAccountReferences)
          type: object
        cancel:
          description: 'The default value of the flag is false. If you want to cancel
            an already processed transaction, resend the transaction with the flag
            set to true. Both External Ids have to match '
          type: boolean
        cashFlowInBankAccountCurrency:
          description: The cash flow amount in the bank account currency.
          example: '~'
          type: number
        clientExternalId:
          description: A reference mechanism which identifies a client's external
            ID.
          example: '~'
          type: string
        comment:
          description: A individual transaction comment. Comments can be used to map
            transactions on specific payment ranges
          type: string
        currency:
          description: Defines the underlying currency reference. The three digit
            ISO (ISO-4217) code of the currency is used
          example: EUR
          type: string
        custodianReference:
          description: |-
            A reference mechanism which identifies a custodian. The custodian reference always refers to a portfolio in the Q-JSON Format

            See: [Custodians](#tag/CustodianReferences)
          type: object
        dueDate:
          description: The date the transaction is due ('YYYY-MM-DD')
          example: '2022-01-24'
          type: string
        exchange:
          description: ~The stock exchange or market where the transaction was traded.
            You can use the ISO 10383 Market Identifier Code
          example: '~'
          type: object
        externalId:
          description: A unique external ID which identifies the transaction. The
            ExternalId is used to link cash- and asset-transactions. The external
            ID can be used to query the transaction later on
          example: E-ID-0001
          type: string
        externalIdsForCancelAndRedo:
          description: 'Indicates if the desired transaction to cancel is only a forecast
            transaction. This is normally true if we are a ordering interface. '
          type: array
        fxRates:
          description: If you set the optional FX rate, the amounts TotalValue", "PricePerShare"
            etc. are changed by your rate. There is no need to specify a rate if all
            "Currency" elements match
          example:
          - destination: USD
            rate: 1.18888
            source: EUR
          type: array
        groupingHint:
          description: '~'
          example: '~'
          type: string
        ignorableData:
          description: Adds ignorable metadata to this import item which will not
            get processed by the QJSON Transaction importer
          type: object
        investmentPreference:
          description: |-
            If multiple investments are present, this preference is used to select one.

            See: [Investments](#tag/Investment References)
          example: {}
          type: object
        isCancelAndRedo:
          description: Indicates if an existing transaction should get cancelled.
          type: boolean
        isCancelOnlyForecastTransactions:
          description: 'Returns the (multiple) external ids that should get cancelled.
            Note: These ids should be different from the newly created transaction
            external id, or, in ordering case, only a forecast transaction should
            get cancelled. '
          type: boolean
        legalEntityReference:
          deprecated: true
          description: |-
            A reference mechanism which identifies a legal entity. Deprecated, because it is set by CustodianReference.

            See: [Legal Entities](#tag/LegalEntityReferences)
          type: object
        numberOfShares:
          description: The number of shares involved in the transaction.
          example: '~'
          type: number
        orderReference:
          description: |-
            A reference mechanism which identifies an order

            See: [Orders](#tag/OrderReferences)
          example:
            externalId: E-ID-0001
            type: OrderByExternalId
          type: object
        overrideFindExistingReceivablesLiabilityTransactionReference:
          description: A reference mechanism that identifies a Receivables and Liabilities
            Transaction that needs to be overwritten.
          type: object
        overrideFindExistingTransactionReference:
          description: '~'
          example: '~'
          type: object
        payDate:
          description: The date the transaction is paid ('YYYY-MM-DD') and therefore
            the cash movement occurs
          example: '2022-01-24'
          type: string
        payments:
          description: A optional list of additional payments that can be directly
            linked to the transaction such as fees, commissions, taxes, etc. (absolute
            value)
          example:
          - amount: 122
            currency: EUR
            name: null
          type: array
        pricePerShare:
          description: The price per share for the transaction.
          example: '~'
          type: number
        providerId:
          description: Optional provider ID, which will be used to make a reference
            like Bank Accounts and Custodians unique
          example: QPLIX Bank
          type: string
        ratioShares:
          description: The ratio of new shares to be issued for each subscription
            right.
          example: '~'
          type: number
        ratioSubscriptionRights:
          description: The ratio of subscription rights to underlying shares.
          example: '~'
          type: number
        securityReference:
          description: |-
            A reference mechanism which identifies a security.

            See: [Securities](#tag/SecurityReferences)
          type: object
        sourceFilename:
          description: The name of the source file from which the data was retrieved.
          example: '~'
          type: array
        subscriptionPrice:
          description: The price for which the shares can be obtained.
          example: '~'
          type: number
        tags:
          description: One or multiple tags to attach to the transaction, document,
            etc.
          type: array
        totalValue:
          description: The total value of the transaction.
          example: '~'
          type: number
        type:
          description: The type is used to identify different types. Must be set to
            its specified value.
          type: string
        valueDate:
          description: The value date (Valutadatum, 'YYYY-MM-DD'), when does the bank
            valute the cashflow? Normally, this information comes from the cash entry,
            but sometimes it is already known on the transaction.
          example: '2022-01-26'
          type: string
      required:
      - dueDate
      - bankAccountReference
      - custodianReference
      - securityReference
