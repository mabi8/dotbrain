components:
  schemas:
    AbstractPosition:
      example:
        accruedInterest: 372.0
        clientExternalId: '~'
        currency: EUR
        custodianReference:
          externalId: E-ID-0001
          isOptional: '~'
          referenceScopeOverride: '~'
          subExternalId: '~'
          type: CustodianByExternalId
        dueDate: '2022-01-24'
        fxRates:
        - destination: USD
          rate: 1.18888
          source: EUR
        groupId: null
        groupingHint: '~'
        ignorableData: null
        investmentPreference: null
        legalEntityReference:
          externalId: E-ID-0001
          isOptional: '~'
          type: LegalEntityByExternalId
        navDate: '2022-01-24'
        navType: null
        performanceCurrency: null
        performanceTotalItd: null
        performanceTotalYtd: null
        securityReference:
          creationModel: '~'
          currency: EUR
          custodianHint: '~'
          isin: DE000A1EWWW0
          legalEntityHint: '~'
          needsDirectCurrencyHit: '~'
          type: SecurityByIsin
        sourceFilename: '~'
        type: null
      properties:
        accruedInterest:
          description: The accrued interest at due date if available.
          type: number
        clientExternalId:
          description: A reference mechanism which identifies a client's external
            ID.
          example: '~'
          type: string
        currency:
          description: You can define the underlying currency reference. The three
            digit ISO (ISO-4217) code of the currency is used
          example: EUR
          type: string
        custodianReference:
          description: |-
            A reference mechanism which identifies a custodian. The custodian reference always refers to a portfolio in the Q-JSON Format

            See: [Custodians](#tag/CustodianReferences)
          example:
            externalId: E-ID-0001
            isOptional: '~'
            referenceScopeOverride: '~'
            subExternalId: '~'
            type: CustodianByExternalId
          type: object
        dueDate:
          description: The date the transaction is due ('YYYY-MM-DD')
          example: '2022-01-24'
          type: string
        fxRates:
          description: If you set the optional FX rate, the amounts TotalValue", "PricePerShare"
            etc. are changed by your rate. There is no need to specify a rate if all
            "Currency" elements match
          example:
          - destination: USD
            rate: 1.18888
            source: EUR
          type: array
        groupId:
          description: Allows grouping of multiple delivered position files via this
            id. The group will be seen as one item and no accumulation will happen
          type: string
        groupingHint:
          description: '~'
          example: '~'
          type: string
        ignorableData:
          description: Adds ignorable metadata to this import item which will not
            get processed by the QJSON Transaction importer
          type: object
        investmentPreference:
          description: |-
            A reference mechanism which identifies an investment.

            See: [Investments](#tag/Investment References)
          type: object
        legalEntityReference:
          description: |-
            A reference mechanism which identifies a legal entity.

            See: [Legal Entities](#tag/LegalEntityReferences)
          example:
            externalId: E-ID-0001
            isOptional: '~'
            type: LegalEntityByExternalId
          type: object
        navDate:
          description: The optional date for quotes and nav checks. Uses dueDate if
            not set ('YYYY-MM-DD')
          example: '2022-01-24'
          type: string
        navType:
          description: The nav type as specified by a number. Default = 0, FuturesOnlyPriceChange
            = 1, // only relevant for futures, BondIndexLinkerWithoutIndexRatio =
            4 // only relevant for bonds
          type: object
        performanceCurrency:
          description: Currency for the performance check.
          type: string
        performanceTotalItd:
          description: Performance check for the position in ITD inverval.
          type: number
        performanceTotalYtd:
          description: Performance check for the position in YTD inverval.
          type: number
        securityReference:
          description: |-
            A reference mechanism which identifies a security.

            See: [Securities](#tag/SecurityReferences)
          example:
            creationModel: '~'
            currency: EUR
            custodianHint: '~'
            isin: DE000A1EWWW0
            legalEntityHint: '~'
            needsDirectCurrencyHit: '~'
            type: SecurityByIsin
          type: object
        sourceFilename:
          description: The name of the source file from which the data was retrieved.
          example: '~'
          type: array
        type:
          description: null
          type: string
      required:
      - type
    AccountByRangeReference:
      example:
        rangeName: '~'
        type: AccountByAccountRangeReference
      properties:
        rangeName:
          description: '~'
          example: '~'
          type: string
        type:
          description: The type is used to identify different types. Must be set to
            its specified value.
          type: string
      required: []
    AccountReference:
      example:
        type: null
      properties:
        type:
          description: null
          type: string
      required:
      - type
    AccountingRecordTransaction:
      example:
        amount: 122
        bankAccountReference:
          accountNumber: '123567890'
          currency: EUR
          type: BankAccountByAccountNumber
        cancel: false
        cashFlowInBankAccountCurrency: '~'
        clientExternalId: '~'
        comment: VERWENDUNGSZWECK
        creditAccountNumber: null
        currency: EUR
        custodianReference:
          externalId: E-ID-0001
          isOptional: '~'
          referenceScopeOverride: '~'
          subExternalId: '~'
          type: CustodianByExternalId
        debitAccountNumber: null
        dueDate: '2022-01-24'
        externalId: E-ID-0001
        externalIdsForCancelAndRedo: false
        fxRates:
        - destination: USD
          rate: 1.18888
          source: EUR
        groupingHint: '~'
        ignorableData: null
        investmentPreference: {}
        isCancelAndRedo: false
        isCancelOnlyForecastTransactions: false
        legalEntityReference: '~'
        orderReference:
          externalId: E-ID-0001
          type: OrderByExternalId
        overrideFindExistingReceivablesLiabilityTransactionReference: null
        overrideFindExistingTransactionReference: '~'
        payDate: '2022-01-24'
        payments:
        - amount: 122
          currency: EUR
          name: null
        providerId: QPLIX Bank
        securityReference: '~'
        sourceFilename: '~'
        tags:
        - QPLIX
        - Payments
        - Transaction
        type: AccountingRecord
        valueDate: '2022-01-26'
      properties:
        amount:
          description: The amount of the transaction in asset currency
          type: number
        bankAccountReference:
          description: |-
            A reference mechanism which identifies a bank account

            See: [Bank Accounts](#tag/BankAccountReferences)
          example:
            accountNumber: '123567890'
            currency: EUR
            type: BankAccountByAccountNumber
          type: object
        cancel:
          description: 'The default value of the flag is false. If you want to cancel
            an already processed transaction, resend the transaction with the flag
            set to true. Both External Ids have to match '
          type: boolean
        cashFlowInBankAccountCurrency:
          description: The cash flow amount in the bank account currency.
          example: '~'
          type: number
        clientExternalId:
          description: A reference mechanism which identifies a client's external
            ID.
          example: '~'
          type: string
        comment:
          description: A individual transaction comment. Comments can be used to map
            transactions on specific payment ranges
          type: string
        creditAccountNumber:
          description: The account number of the credit account, has to correspondent
            with the length in the system, no range allowed
          type: object
        currency:
          description: You can define the underlying currency reference. The three
            digit ISO (ISO-4217) code of the currency is used
          example: EUR
          type: string
        custodianReference:
          description: |-
            A reference mechanism which identifies a custodian. The custodian reference always refers to a portfolio in the Q-JSON Format

            See: [Custodians](#tag/CustodianReferences)
          example:
            externalId: E-ID-0001
            isOptional: '~'
            referenceScopeOverride: '~'
            subExternalId: '~'
            type: CustodianByExternalId
          type: object
        debitAccountNumber:
          description: The account number of the debit account, has to correspondent
            with the length in the system, no range allowed
          type: object
        dueDate:
          description: The date the transaction is due ('YYYY-MM-DD')
          example: '2022-01-24'
          type: string
        externalId:
          description: A unique external ID which identifies the transaction. The
            ExternalId is used to link cash- and asset-transactions. The external
            ID can be used to query the transaction later on
          example: E-ID-0001
          type: string
        externalIdsForCancelAndRedo:
          description: 'Indicates if the desired transaction to cancel is only a forecast
            transaction. This is normally true if we are a ordering interface. '
          type: array
        fxRates:
          description: If you set the optional FX rate, the amounts TotalValue", "PricePerShare"
            etc. are changed by your rate. There is no need to specify a rate if all
            "Currency" elements match
          example:
          - destination: USD
            rate: 1.18888
            source: EUR
          type: array
        groupingHint:
          description: '~'
          example: '~'
          type: string
        ignorableData:
          description: Adds ignorable metadata to this import item which will not
            get processed by the QJSON Transaction importer
          type: object
        investmentPreference:
          description: |-
            If multiple investments are present, this preference is used to select one.

            See: [Investments](#tag/Investment References)
          example: {}
          type: object
        isCancelAndRedo:
          description: Indicates if an existing transaction should get cancelled.
          type: boolean
        isCancelOnlyForecastTransactions:
          description: 'Returns the (multiple) external ids that should get cancelled.
            Note: These ids should be different from the newly created transaction
            external id, or, in ordering case, only a forecast transaction should
            get cancelled. '
          type: boolean
        legalEntityReference:
          description: |-
            A reference mechanism which identifies a legal entity.

            See: [Legal Entities](#tag/LegalEntityReferences)
          example: '~'
          type: object
        orderReference:
          description: |-
            A reference mechanism which identifies an order

            See: [Orders](#tag/OrderReferences)
          example:
            externalId: E-ID-0001
            type: OrderByExternalId
          type: object
        overrideFindExistingReceivablesLiabilityTransactionReference:
          description: A reference mechanism that identifies a Receivables and Liabilities
            Transaction that needs to be overwritten.
          type: object
        overrideFindExistingTransactionReference:
          description: '~'
          example: '~'
          type: object
        payDate:
          description: The date the transaction is paid ('YYYY-MM-DD') and therefore
            the cash movement occurs
          example: '2022-01-24'
          type: string
        payments:
          description: A optional list of additional payments that can be directly
            linked to the transaction such as fees, commissions, taxes, etc. (absolute
            value)
          example:
          - amount: 122
            currency: EUR
            name: null
          type: array
        providerId:
          description: Optional provider ID, which will be used to make a reference
            like Bank Accounts and Custodians unique
          example: QPLIX Bank
          type: string
        securityReference:
          description: |-
            A reference mechanism which identifies a security.

            See: [Securities](#tag/SecurityReferences)
          example: '~'
          type: object
        sourceFilename:
          description: The name of the source file from which the data was retrieved.
          example: '~'
          type: array
        tags:
          description: One or multiple tags to attach to the transaction, document,
            etc.
          example:
          - QPLIX
          - Payments
          - Transaction
          type: array
        type:
          description: The type is used to identify different types. Must be set to
            its specified value.
          type: string
        valueDate:
          description: The value date (Valutadatum, 'YYYY-MM-DD'), when does the bank
            valute the cashflow? Normally, this information comes from the cash entry,
            but sometimes it is already known on the transaction.
          example: '2022-01-26'
          type: string
      required:
      - dueDate
      - amount
      - creditAccountNumber
      - debitAccountNumber
